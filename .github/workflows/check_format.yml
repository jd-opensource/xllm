name: CheckFormat

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - 'cibuild/**'
      - 'cmake/**'
      - 'docs/**'
      - 'third_party/**'
      - 'tools/**'
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths-ignore:
      - '.github/**'
      - 'cibuild/**'
      - 'cmake/**'
      - 'docs/**'
      - 'third_party/**'
      - 'tools/**'
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check-permission:
    runs-on: [self-hosted]
    outputs:
      do_check: ${{ steps.decide.outputs.do_check }}
      base_commit: ${{ steps.decide.outputs.base_commit }}
      pr_head_ref: ${{ steps.decide.outputs.pr_head_ref }}
    steps:
      - name: Decide whether to check
        id: decide
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          check_mergeable() {
            local pr_number=$1
            curl -s \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/${pr_number}" | \
              python3 -c "import sys, json; print(json.load(sys.stdin).get('mergeable'))"
          }

          event="${{ github.event_name }}"

          if [[ "$event" == "workflow_dispatch" || "$event" == "push" ]]; then
            echo "do_check=true" >> $GITHUB_OUTPUT
            echo "base_commit=${{ github.sha }}~1" >> $GITHUB_OUTPUT
            echo "pr_head_ref=" >> $GITHUB_OUTPUT

          elif [[ "$event" == "pull_request" ]]; then
            mergeable=$(check_mergeable "${{ github.event.pull_request.number }}")
            if [[ "$mergeable" == "False" ]]; then
              echo "PR has merge conflicts, skipping CI." >&2
              echo "do_check=false" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "do_check=true" >> $GITHUB_OUTPUT
            echo "base_commit=${{ github.event.pull_request.base.sha }}" >> $GITHUB_OUTPUT
            echo "pr_head_ref=refs/pull/${{ github.event.pull_request.number }}/head" >> $GITHUB_OUTPUT

          elif [[ "$event" == "issue_comment" ]]; then
            if [[ -z "${{ github.event.issue.pull_request.url }}" ]]; then
              echo "do_check=false" >> $GITHUB_OUTPUT
              exit 0
            fi
            if [[ "${{ github.event.comment.body }}" != "/build" ]]; then
              echo "do_check=false" >> $GITHUB_OUTPUT
              exit 0
            fi
            permission=$(curl -s \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/collaborators/${{ github.event.comment.user.login }}/permission" | \
              python3 -c "import sys, json; print(json.load(sys.stdin).get('permission', 'none'))")
            if [[ "$permission" != "write" && "$permission" != "maintain" && "$permission" != "admin" ]]; then
              echo "do_check=false" >> $GITHUB_OUTPUT
              exit 0
            fi
            pr_number="${{ github.event.issue.number }}"
            mergeable=$(check_mergeable "$pr_number")
            if [[ "$mergeable" == "False" ]]; then
              echo "PR has merge conflicts, skipping CI." >&2
              echo "do_check=false" >> $GITHUB_OUTPUT
              exit 0
            fi
            pr_info=$(curl -s \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/${pr_number}")
            base_sha=$(echo "$pr_info" | python3 -c "import sys, json; print(json.load(sys.stdin)['base']['sha'])")
            echo "do_check=true" >> $GITHUB_OUTPUT
            echo "base_commit=$base_sha" >> $GITHUB_OUTPUT
            echo "pr_head_ref=refs/pull/${pr_number}/head" >> $GITHUB_OUTPUT

          else
            echo "do_check=false" >> $GITHUB_OUTPUT
          fi

  format-check:
    needs: check-permission
    if: needs.check-permission.outputs.do_check == 'true'
    runs-on: [self-hosted]
    steps:
      - name: Install clang-format
        run: |
          pip install clang-format==20.1.6
          clang-format --version

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.check-permission.outputs.pr_head_ref || github.sha }}

      - name: Verify clang-format configuration
        run: |
          if [ ! -f ".clang-format" ]; then
            echo "❌ .clang-format file not found in repository root"
            exit 1
          fi
          clang-format --style=file --dump-config > /dev/null || {
            echo "❌ .clang-format file has invalid format"
            exit 1
          }

      - name: Check code format
        shell: /usr/bin/bash {0}
        run: |
          BASE_COMMIT="${{ needs.check-permission.outputs.base_commit }}"
          CLANG_FORMAT_FILE="$(pwd)/.clang-format"

          IGNORED_PATHS=(
            "^.github/.*"
            "^cibuild/.*"
            "^cmake/.*"
            "^docs/.*"
            "^third_party/.*"
            "^tools/.*"
          )

          FILES=$(git diff --name-only "$BASE_COMMIT" -- '*.c' '*.h' '*.cc' '*.cp' '*.cpp' '*.c++' '*.cxx' '*.hh' '*.hpp' '*.hxx' '*.inc' '*.cu' '*.cuh' | \
            grep -v -E "$(IFS=\|; echo "${IGNORED_PATHS[*]}")")

          if [ -z "$FILES" ]; then
            echo "✅ No files to check (all excluded)"
            exit 0
          fi

          diff=$(git-clang-format \
            --style=file:"$CLANG_FORMAT_FILE" \
            --extensions="c,h,cc,cp,cpp,c++,cxx,hh,hpp,hxx,inc,cu,cuh" \
            --commit "$BASE_COMMIT" \
            --diff \
            -- $FILES)

          if [ "$diff" = "no modified files to format" ] || [ "$diff" = "clang-format did not modify any files" ]; then
            echo "✅ Code format is correct"
            exit 0
          fi

          printf "\n❌ You have introduced coding style breakages.\n"
          printf "\n\033[1mSuggested changes:\n\n"
          echo "$diff"
          exit 1
