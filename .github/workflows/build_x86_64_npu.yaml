name: xLLM Build x86_64 NPU

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - 'cibuild/**'
      - 'cmake/**'
      - 'docs/**'
      - 'third_party/**'
      - 'tools/**'
      - '*.md'
      - '*.txt'
      - '*.yml'
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'cmake/**'
      - 'docs/**'
      - 'third_party/**'
      - 'tools/**'
      - '*.md'
      - '*.txt'
      - '*.yml'
  pull_request_review:
    types: [submitted]

env:
  JOBNAME: xllm-x86_64-npu-cibuild-${{ github.run_id }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  # Build only after PR has been approved.
  # - pull_request (open/push): build if PR already has an approval
  # - pull_request_review: build only when this review is an approval
  # - push to main / workflow_dispatch: always build
  check-approval:
    runs-on: [self-hosted]
    outputs:
      do_build: ${{ steps.decide.outputs.do_build }}
    steps:
      - name: Decide whether to build
        id: decide
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          event="${{ github.event_name }}"
          if [[ "$event" == "workflow_dispatch" || "$event" == "push" ]]; then
            echo "do_build=true" >> $GITHUB_OUTPUT
          elif [[ "$event" == "pull_request_review" ]]; then
            if [[ "${{ github.event.review.state }}" == "approved" ]]; then
              echo "do_build=true" >> $GITHUB_OUTPUT
            else
              echo "do_build=false" >> $GITHUB_OUTPUT
            fi
          elif [[ "$event" == "pull_request" ]]; then
            pr_number="${{ github.event.pull_request.number }}"
            response=$(curl -s \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/${pr_number}/reviews")
            has_approval=$(echo "$response" | python3 -c "
import sys, json
reviews = json.load(sys.stdin)
print('true' if any(r['state'] == 'APPROVED' for r in reviews) else 'false')
")
            echo "do_build=$has_approval" >> $GITHUB_OUTPUT
          else
            echo "do_build=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-approval
    if: needs.check-approval.outputs.do_build == 'true'
    runs-on: [self-hosted]
    steps:
    - name: Checkout Code
      timeout-minutes: 5
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Build
      if: ${{ success() }}
      timeout-minutes: 60
      run: |
        chmod +x ./cibuild/build_npu.sh
        bash cibuild/build_npu.sh 'pip install pre-commit -i https://pypi.tuna.tsinghua.edu.cn/simple; python setup.py bdist_wheel; pip install dist/* --force-reinstall; python examples/generate.py --model="/export/home/models/Qwen2-7B-Instruct" --devices="npu:7"'
